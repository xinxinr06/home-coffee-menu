name: Deploy Home Coffee Menu to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout menu repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout Quartz v4
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: v4
          path: .quartz
          fetch-depth: 1

      - name: Copy site configuration
        run: |
          cp quartz.config.ts .quartz/quartz.config.ts
          cp quartz.layout.ts .quartz/quartz.layout.ts
          cp quartz/styles/custom.scss .quartz/quartz/styles/custom.scss

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: .quartz/package-lock.json

      - name: Install Quartz dependencies
        working-directory: .quartz
        run: npm ci

      - name: Build Quartz
        working-directory: .quartz
        run: npx quartz build -d "../content/Home Coffee Menu"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .quartz/public

  deploy:
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
